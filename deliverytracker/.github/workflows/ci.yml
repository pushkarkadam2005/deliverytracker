name: Java CI with Maven

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build, Test and Package
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repository ──────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 2. Set up Java 21 with Maven caching ──────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # ── 3. Build project & Run unit tests ──────────────────────────────────
      # Executes the full compilation and unit test suite.
      # If any tests fail, the exit code is non-zero, terminating the job immediately.
      - name: Build and Run Unit Tests
        run: mvn clean package -B

      # ── 4. Upload packaged fat JAR as artifact ──────────────────────────────
      - name: Upload Packaged Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deliverytracker-api
          path: target/*.jar
          if-no-files-found: error
          retention-days: 7
